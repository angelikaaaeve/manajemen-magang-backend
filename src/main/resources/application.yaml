spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false 
  application:
    name: manajement_magang
  datasource:
    url: jdbc:postgresql://localhost:5432/manajemen_magang
    username: postgres
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties: 
  hibernate:
    dialect: org.hibernate.dialect.postgreSQLDialect
    format_sql: true